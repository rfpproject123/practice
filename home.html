<center style="width: 1000px; margin-left: 200px; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center;">

  <h1 style="color: white; font-size: 100px; text-shadow: 2px 2px 10px rgba(0,0,0,0.3);">
    Table Turn Over
  </h1>

  <br><br>

  <p style="font-size: 30px; font-family: Arial, sans-serif; color: white;">
    Enter the details of your cafe or restaurant
  </p>

  <br><br><br>

  <!-- Number of Tables -->
  <div style="display: flex; align-items: center; gap: 20px; flex-wrap: wrap; justify-content: center;">
    <label for="noOfTables" style="font-size: 30px; font-family: 'Gill Sans', sans-serif; font-weight: bolder; color: white;">
      Number of Tables in cafe or restaurant:
    </label>

    <select id="noOfTables" name="noOfTables"
      style="padding: 12px 20px; font-size: 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.4); background: rgba(255,255,255,0.2); color: white; min-width: 200px; backdrop-filter: blur(10px); box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
      <option value="">-- Select --</option>
      <option value="1">1</option>
      <option value="2">2</option>
      <option value="3">3</option>
      <option value="4">4</option>
      <option value="5">5</option>
      <option value="6">6</option>
      <option value="7">7</option>
      <option value="8">8</option>
      <option value="9">9</option>
      <option value="10">10</option>
    </select>
  </div>

  <br><br>

  <!-- Dynamic Seat Dropdowns -->
  <div id="tablesContainer"></div>

  <br><br>

  <!-- Confirm Button -->
  <button id="generateBtn"
    style="padding:12px 25px; font-size:20px; background:rgb(213,129,86); border:none; border-radius:15px; cursor:pointer; color:white;">
    Confirm
  </button>

  <!-- Summary Below Button -->
  <div id="resultContainer"
       style="
          max-width: 600px;
          margin-top: 30px;
          color: white;
          opacity: 0;
          transform: translateY(20px);
          transition: all 0.5s ease;
       ">
  </div>

</center>
