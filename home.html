<div class="page">

    <div id="formSection" class="card large center">

        <div class="page-header">
            <h1 class="big-title" style="font-size: 100px;">Table Turn Over</h1>
            <p class="big-subtitle" style="font-size: 30px;">Enter details of your restaurent (or) cafe</p>
        </div>

        <div class="form-group">
            <label class="big-label" style="font-size: 25px;">Number of Tables</label>
            <select id="noOfTables" class="input large-input">
                <option value="">Select</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
                <option value="7">7</option>
                <option value="8">8</option>
                <option value="9">9</option>
                <option value="10">10</option>
            </select>
        </div>

        <div id="tablesContainer"></div>

        <button id="generateBtn" class="btn-primary large-btn">SUBMIT</button>

    </div>

    <div id="summarySection" class="card large center hidden">

        <div class="page-header">
            <h1 class="big-title">Overview of Tables</h1>
            <p class="big-subtitle">seating summary</p>
        </div>

        <div class="stats big-stats">
            <div class="stat-box">
                <span>Total Tables</span>
                <h2 id="totalTablesDisplay" class="big-number">0</h2>
            </div>

            <div class="stat-box">
                <span>Total Capacity</span>
                <h2 id="totalSeatsDisplay" class="big-number">0</h2>
            </div>
        </div>

        <div id="summaryContent" class="breakdown"></div>

        <button id="editBtn" class="btn-secondary large-btn">Edit Configuration</button>

    </div>

</div>
