<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create New User</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <h3 style="text-align: center; height:max-content; font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif; font-size: 55px ; color:whitesmoke; border: black;">Create new User</h3>
    <br><br><br><br><br><br><br>
    <form>
        <form>
        <div align = "center" class = "createuser">
            <label for="fname" style="font-size: 30px; width: 200px; font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif; font: bold; color: white;">
                first name:
            </label>
            <input type="test" id="fname" name="fname" placeholder="first_name" required>
        <br>
        <br>
        <br>
            <label for="lname" style="font-size: 30px; width: 200px; font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif; font: bold; color: white;">
                last name:
            </label>
            <input type="test" id="lname" name="lname" placeholder="last_name">
        <br>
        <br>
        <br>
            <label for="pass" style="font-size: 30px; width: 200px; font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif; font: bold; color: white;">
                password:
            </label>
            <input type="password" maxlength="12" id="pass" name="pass" placeholder="password" required>
        <br>
        <br>
        <br>
            <label for="email" style="font-size: 30px; width: 200px; font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif; font: bold; color: white;">
                email:
            </label>
            <input type="email" id="email" name="email" placeholder="email@gmail.com">
        <br>
        <br>
        <br>
            <button onclick="login_for_service()" style="width: 150px; height: 50px; font-size: 30px;">Login👈</button>

        </div>
        <br>

    </form>


</body>
</html>
