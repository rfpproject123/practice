<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account — Table Turnover</title>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0d1117;
            --card: #161b22;
            --border: rgba(255, 255, 255, 0.07);
            --text: #e6edf3;
            --muted: #7d8590;
            --accent: #d58156;
            --accent2: #f5c6a5;
            --input-bg: #0d1117;
            --error: #f87171;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        body::before {
            content: '';
            position: fixed;
            top: -200px;
            left: -200px;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(213, 129, 86, 0.08) 0%, transparent 70%);
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 400px;
            animation: fadeUp 0.6s ease both;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .brand {
            text-align: center;
            margin-bottom: 36px;
        }

        .brand-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            margin-bottom: 14px;
        }

        .brand h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 26px;
            font-weight: 400;
        }

        .brand p {
            font-size: 14px;
            color: var(--muted);
            margin-top: 6px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 36px 32px;
        }

        .row {
            display: flex;
            gap: 14px;
        }

        .row .field {
            flex: 1;
        }

        .field {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--muted);
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--accent);
        }

        input::placeholder {
            color: #3d444d;
        }

        .btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, var(--accent), #c4714a);
            border: none;
            border-radius: 10px;
            color: white;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 8px;
            transition: opacity 0.2s, transform 0.1s;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error-msg {
            color: var(--error);
            font-size: 13px;
            margin-top: 12px;
            text-align: center;
            display: none;
        }

        .footer {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: var(--muted);
        }

        .footer a {
            color: var(--accent2);
            text-decoration: none;
            font-weight: 500;
        }

        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="brand">
            <div class="brand-icon">🍽️</div>
            <h1>Create Account</h1>
            <p>Set up your Table Turnover account</p>
        </div>
        <div class="card">
            <div class="row">
                <div class="field">
                    <label>First Name</label>
                    <input type="text" placeholder="John" id="fname">
                </div>
                <div class="field">
                    <label>Last Name</label>
                    <input type="text" placeholder="Doe" id="lname">
                </div>
            </div>
            <div class="field">
                <label>Email</label>
                <input type="email" placeholder="you@example.com" id="email">
            </div>
            <div class="field">
                <label>Password</label>
                <input type="password" placeholder="••••••••" id="password" maxlength="12">
            </div>
            <button class="btn" id="registerBtn" onclick="handleCreate()">Create Account</button>
            <p class="error-msg" id="errorMsg"></p>
        </div>
        <div class="footer">
            Already have an account? <a href="/loginpage.html">Sign in</a>
        </div>
    </div>
    <script>
        async function handleCreate() {
            const firstName = document.getElementById('fname').value.trim();
            const lastName = document.getElementById('lname').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('registerBtn');
            const errorMsg = document.getElementById('errorMsg');

            if (!firstName || !email || !password) {
                showError('First name, email and password are required');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Creating account...';
            errorMsg.style.display = 'none';

            try {
                const res = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ firstName, lastName, email, password })
                });
                const data = await res.json();
                if (data.success) {
                    window.location.href = '/app';
                } else {
                    showError(data.error);
                    btn.disabled = false;
                    btn.textContent = 'Create Account';
                }
            } catch (e) {
                showError('Something went wrong. Try again.');
                btn.disabled = false;
                btn.textContent = 'Create Account';
            }
        }

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.style.display = 'block';
        }

        document.addEventListener('keydown', e => { if (e.key === 'Enter') handleCreate(); });
    </script>
</body>

</html>
